services:

  # ── Weaviate (vector store) ────────────────────────────────────────────────
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.29.2
    container_name: rag_weaviate
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - ./weaviate_db:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        - HF_TOKEN=${HF_TOKEN}

    container_name: rag_backend
    env_file:
      - .env
    environment:
      # Override localhost values so containers resolve each other by service name
      WEAVIATE_HOST: weaviate
      HF_TOKEN: ${HF_TOKEN}
      LOCAL_MODEL_PATH: /models/gemma-e2b/model.litertlm

    volumes:
      # Bind-mount the local LLM model directory (only needed when LLM_PROVIDER=local)
      # Example: LOCAL_MODELS_DIR=/home/yourname/.litert-lm/models
      - ${LOCAL_MODELS_DIR:-/home/<your-username>/.litert-lm/models}:/models:ro

    ports:
      - "8000:8000"
    depends_on:
      weaviate:
        condition: service_healthy
    restart: unless-stopped


  # ── React frontend (Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
